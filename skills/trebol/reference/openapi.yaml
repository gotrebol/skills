      summary: Crear nuevo flujo
      description: |
        Crea un nuevo flujo de cuenta. Visita la [guía de desarrollo](/docs/guia-devs/personalizar-widget) para más información.

        > **Nota:** El cuerpo de la solicitud está limitado a **200 KB** por nuestro WAF. Si tu configuración (reglas de validación, esquemas de formulario, listas de `flow_items`, etc.) supera este tamaño, la solicitud será rechazada antes de llegar al backend. Revisa las [recomendaciones de la guía](/guia-devs/account-flows) para mantenerte dentro del límite.
      requestBody:
        required: true
