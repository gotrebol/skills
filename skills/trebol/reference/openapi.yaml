components:
  parameters:
    etiquetaParam:
      name: etiqueta
      in: path
      required: true
      description: La etiqueta única que identifica la empresa dentro de tu sistema interno
      schema:
        type: string
    verificationIdParam:
      name: verification-id
      in: path
      required: true
      description: El ID único de la verificación
      schema:
        type: string
    webhookIdParam:
      name: webhookId
      in: path
      required: true
      description: ID único del webhook
      example: "wh_123"
      schema:
        type: string
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  responses:
    BadRequestError:
      description: Datos de entrada inválidos
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            ValidationError:
              summary: Error de validación
              value:
                success: false
                message: "Validation failed: 'items' is required"
                code: VALIDATION_ERROR
                timestamp: "2025-01-01T12:34:56.000Z"
            ItemsNotProvided:
              summary: items_not_provided
              value:
                success: false
                message: "Please provide a valid items array or a flow id in your request"
                code: items_not_provided
                timestamp: "2025-01-01T12:34:56.000Z"
            InvalidItemType:
              summary: invalid_item_type
              value:
                success: false
                message: "The generic item type is not supported"
                code: invalid_item_type
                timestamp: "2025-01-01T12:34:56.000Z"
            InvalidItemOptionsFileUrl:
              summary: invalid_item_options_file_url
              value:
                success: false
                message: "The specified file_url is invalid. Ensure it is public and downloadable."
                code: invalid_item_options_file_url
                timestamp: "2025-01-01T12:34:56.000Z"
    UnauthorizedError:
      description: No autorizado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            Unauthorized:
              summary: Falta API key o inválida
              value:
                success: false
                message: "Unauthorized"
                code: UNAUTHORIZED
                timestamp: "2025-01-01T12:34:56.000Z"
    NotFoundError:
      description: Recurso no encontrado
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          examples:
            NotFound:
              summary: Recurso inexistente
              value:
                success: false
                message: "Entity not found"
                code: NOT_FOUND
                timestamp: "2025-01-01T12:34:56.000Z"
    ConflictError:
