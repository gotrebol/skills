        validations:
          type: array
          items: { $ref: "#/components/schemas/V2PublicValidation" }
          nullable: true
      nullable: true

    V2PublicJSONValue:
      type: object
      properties:
        value:
          type: object
          additionalProperties: true
        source: { $ref: "#/components/schemas/V2PublicSource" }
