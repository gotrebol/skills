          description: Lista de eventos suscritos
          items:
            type: string
            example: "verification.v2.created"
        status:
          type: string
          enum: ["enabled", "disabled"]
          description: Indica si el webhook está habilitado o deshabilitado. Al crear el webhook, el status por defecto es "enabled".
          example: "enabled"
        description:
          type: string
          nullable: true
          description: Descripción opcional del webhook
        secret:
          type: string
          description: Secreto del webhook. Se asigna una vez que se crea el webhook y solo se muestra una vez.
          example: "whsec_XXXXXXXXXXXXXXXXXXXXXXXX"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    WebhookGet:
      type: object
      properties:
        id:
          type: string
          description: ID único del webhook
          example: "wh_123"
        url:
