  /v2/verifications/{verification-id}/export/{doc-template-id}:
    get:
      tags:
        - Exportación de Verificaciones
      summary: Exportar datos de verificación a documento personalizado
      description: |
        Exporta los datos de una verificación a un documento personalizado (PDF o Word) reemplazando los IDs con la información extraída.

        El endpoint recibe un documento que contiene IDs (marcadores de posición) que se encuentran documentados en la [sección de plantillas](/docs/plantillas/intro).
        Estos IDs serán reemplazados automáticamente con la información extraída de cada item de la verificación.

        **Funcionalidad:**
        - Genera un diccionario de variables únicas a partir de la información extraída
        - Reemplaza los IDs en el documento con la información correspondiente
        - Retorna el documento procesado con los datos actualizados

        **Tipos de documentos soportados:** PDF, Word (.docx)

      parameters:
        - $ref: "#/components/parameters/verificationIdParam"
        - in: path
          name: doc-template-id
          required: true
          description: El ID de la plantilla de documento. Ver [plantillas de documentos](/docs/plantillas/gestion).
          schema:
            type: string
      responses:
        "200":
          description: JSON con la url de descarga del archivo y otros datos adicionales.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Booleano que indica si la exportación fue exitosa.
                    example: true
                  message:
                    type: string
                    description: Mensaje de éxito.
                    example: "File generated successfully. Download URL provided."
                  download_url:
                    type: string
                    description: URL de descarga del archivo. Al acceder a ella se descargará el archivo automáticamente.
                    example: "https://www.gotrebol.com/download/file.pdf"
                  expires_in:
                    type: number
                    description: Tiempo de expiración del enlace en milisegundos(1 hora).
                    example: 3600000
                  size:
                    type: number
                    description: Tamaño del archivo en bytes.
                    example: 1000000
              examples:
                success:
                  summary: Exportación exitosa
                  value:
                    success: true
                    message: "File generated successfully. Download URL provided."
                    download_rl: "https://www.gotrebol.com/download/file.pdf"
                    expiresIn: 3600000
                    size: 1000000
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: Verificación sin items o datos insuficientes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "verification with no items"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []
    post:
      tags:
        - Exportación de Verificaciones
      summary: Exportar datos de verificación a documento personalizado con variables de apoderados
      description: |
        Exporta los datos de una verificación a un documento personalizado (PDF o Word) reemplazando los IDs con la información extraída, incluyendo el mapeo de variables de apoderados.

        Este endpoint permite especificar qué personas y roles se deben usar para llenar las variables de apoderados en la plantilla. Las variables en la plantilla deben usar la nomenclatura `{key_person_#}` donde `#` es un número (ej: `{key_person_1}`, `{key_person_2}`).

        **Funcionalidad:**
        - Genera un diccionario de variables únicas a partir de la información extraída
        - Reemplaza los IDs en el documento con la información correspondiente
        - Mapea las variables de apoderados (`{key_person_#}`) con las personas y roles especificados en el body
        - Retorna el documento procesado con los datos actualizados

        **Obtener IDs de personas y roles:**
        Los valores de `person_id` y `role_id` se pueden obtener del endpoint [Obtener sección por ID de verificación](/docs/api-reference/leer-información-de-la-empresa/obtener-sección-por-id-de-verificación) bajo la sección `/people`:
        - `person_id`: Se obtiene del campo `people_id` en cada objeto del array `key_people`
        - `role_id`: Se obtiene del campo `id` en cada objeto del array `roles` dentro de cada elemento de `key_people`

        **Tipos de documentos soportados:** PDF, Word (.docx)

      parameters:
        - $ref: "#/components/parameters/verificationIdParam"
        - in: path
          name: doc-template-id
          required: true
          description: El ID de la plantilla de documento. Ver [plantillas de documentos](/docs/plantillas/gestion).
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExportWithKeyPeopleRequest"
            examples:
              basic:
                summary: Ejemplo básico con dos apoderados
                value:
                  key_people:
                    - key: "key_person_1"
                      person_id: 10
                      role_id: "role_123"
                    - key: "key_person_2"
                      person_id: 15
                      role_id: "role_456"
      responses:
        "200":
          description: JSON con la url de descarga del archivo y otros datos adicionales.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Booleano que indica si la exportación fue exitosa.
                    example: true
                  message:
                    type: string
                    description: Mensaje de éxito.
                    example: "File generated successfully. Download URL provided."
                  download_url:
                    type: string
                    description: URL de descarga del archivo. Al acceder a ella se descargará el archivo automáticamente.
                    example: "https://www.gotrebol.com/download/file.pdf"
                  expires_in:
                    type: number
                    description: Tiempo de expiración del enlace en milisegundos(1 hora).
                    example: 3600000
                  size:
                    type: number
                    description: Tamaño del archivo en bytes.
                    example: 1000000
              examples:
                success:
                  summary: Exportación exitosa
                  value:
                    success: true
                    message: "File generated successfully. Download URL provided."
                    download_url: "https://www.gotrebol.com/download/file.pdf"
                    expiresIn: 3600000
                    size: 1000000
        "400":
          $ref: "#/components/responses/BadRequestError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "422":
          description: Verificación sin items o datos insuficientes.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "verification with no items"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

