    RetentionPolicy:
      type: object
      description: Política de retención de datos de la cuenta
      properties:
        retention_days:
          type: integer
          minimum: 1
          maximum: 3650
          description: Número de días que se conservarán los datos antes de ser eliminados automáticamente
          example: 30
      required:
        - retention_days

    RetentionPolicyRequest:
      type: object
      description: Solicitud para crear o actualizar la política de retención
      properties:
        retention_days:
          type: integer
          minimum: 1
          maximum: 3650
          description: Número de días que se conservarán los datos antes de ser eliminados automáticamente
          example: 30
      required:
        - retention_days

    PublicFormSchema:
      type: object
      description: Esquema de formulario público para la cuenta
      properties:
        id_schema:
          type: string
          description: Identificador único del esquema
          example: "onboarding-form"
        account_id:
          type: string
          description: ID de la cuenta a la que pertenece el esquema
          example: "acc_1234567890abcdef"
        name:
          type: string
          description: Nombre del esquema de formulario
          example: "Formulario de Onboarding"
        ui_schema_definition:
          $ref: "#/components/schemas/UISchemaField"
      required:
        - id_schema
        - account_id
        - name
        - ui_schema_definition

    UISchemaField:
      type: object
      description: |
        Definición de campo de esquema de interfaz de usuario. Esta estructura permite definir formularios 
        dinámicos con campos anidados y diferentes tipos de entrada. El esquema soporta campos simples 
        como texto, números, fechas, y campos complejos como secciones que pueden contener otros campos.

        **Estructura jerárquica**: Los campos pueden anidarse usando el tipo "section", permitiendo 
        crear formularios con múltiples niveles de organización.

        **Validación automática**: El sistema valida automáticamente que todos los campos referenciados 
        en ui_order existan como propiedades en el mismo nivel.
      properties:
        ui_order:
          type: array
          items:
            type: string
          description: |
            Array que define el orden de aparición de los campos en la interfaz de usuario. 
            Debe contener los nombres de todos los campos definidos en el mismo nivel del objeto.
            Es obligatorio en el nivel raíz y opcional en secciones anidadas o en tablas para configurar el orden de sus columnas.
          example: ["nombre", "apellido", "notaria"]
        ui_type:
          type: string
          enum:
            [
              "file",
              "date",
              "section",
              "select",
              "multiselect",
              "number",
              "email",
              "password",
              "text",
              "table",
            ]
          description: |
            Tipo de campo que determina cómo se renderiza en la interfaz:
            - **text**: Campo de texto simple
            - **number**: Campo numérico
            - **email**: Campo de email con validación
            - **password**: Campo de contraseña (oculto)
            - **date**: Selector de fecha
            - **file**: Selector de archivo
            - **select**: Lista desplegable (requiere ui_items)
            - **multiselect**: Selección múltiple (requiere ui_items)
            - **section**: Contenedor para agrupar otros campos
            - **table**: Tabla para solicitar un número indeterminado de datos de cualquier tipo de campo **Excepto para el tipo de campo `file`**. Requiere ui_columns.
            - **paragraph**: Label o texto que no tiene ningún input asociado, usado a nivel informativo. Requiere solamente ui_label.
            - **heading**: Encabezado que no tiene ningún input asociado, usado a nivel informativo. Requiere solamente ui_label.
          example: "text"
        ui_label:
          type: string
          description: |
            Etiqueta visible que se muestra al usuario para identificar el campo. 
            Debe ser descriptivo y claro para facilitar la comprensión del usuario.
          example: "Nombre"
        ui_required:
          type: boolean
          description: |
            Indica si el campo es obligatorio. Los campos requeridos deben ser 
            completados antes de poder enviar el formulario.
          example: true
        ui_items:
          type: array
          items:
            type: string
          description: |
            Array de opciones disponibles para campos de tipo select, multiselect. 
            Solo es necesario para estos tipos de campo. Cada string representa una opción 
            que el usuario puede seleccionar.
          example: ["opcion1", "opcion2", "opcion3"]
        ui_columns:
          type: object
          description: |
            Objeto que define las columnas de la tabla.
            Cada propiedad del objeto es una columna y debe tener un objeto con las propiedades:
            - ui_type: Tipo de campo
            - ui_label: Etiqueta de la columna
            - ui_required: Indica si la columna es obligatoria.
            - ui_items: Array de opciones disponibles para campos de tipo select, multiselect.
          example:
            nombre:
              ui_type: "text"
              ui_label: "Nombre"
              ui_required: true
            tipo_id:
              ui_type: "select"
              ui_label: "Tipo ID"
              ui_required: true
              ui_items: ["RFC", "CURP"]
      additionalProperties:
        oneOf:
          - $ref: "#/components/schemas/UISchemaField"
          - type: "array"
            items:
              type: string
          - type: string
          - type: boolean
      example:
        ui_order: ["junta_directiva", "nombre", "apellido", "notaria"]
        nombre:
          ui_type: "text"
          ui_label: "Nombre"
        apellido:
          ui_type: "text"
          ui_label: "Apellido"
        junta_directiva:
          ui_type: "table"
          ui_label: "Integrantes miembros de la junta directiva"
          ui_columns:
            id_type:
              ui_type: "select"
              ui_label: "ID"
              ui_items: ["RFC", "CURP"]
            id_number:
              ui_type: "text"
              ui_label: "No. de identificación"
            names:
              ui_type: "text"
              ui_label: "Nombres y Apellidos"
        notaria:
          ui_type: "section"
          ui_label: "Notaria"
          ui_order: ["nombre", "direccion", "identidad"]
          nombre:
            ui_type: "text"
            ui_label: "Nombre"
          direccion:
            ui_type: "text"
            ui_label: "Direccion"
          identidad:
            ui_type: "section"
            ui_label: "Identidad"
            ui_order: ["curp", "rfc"]
            curp:
              ui_type: "text"
              ui_label: "CURP"
            rfc:
              ui_type: "text"
              ui_label: "RFC"
    Webhook:
      type: object
      properties:
        id:
          type: string
          description: ID único del webhook
          example: "wh_123"
        url:
          type: string
          format: uri
          description: URL a la que Trebol enviará las notificaciones
          example: "https://example.com/webhooks/trebol"
        events:
