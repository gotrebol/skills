        document_date: { type: string, nullable: true }
        document_number: { type: string, nullable: true }
        entity_name: { type: string, nullable: true }
        extra_fields:
          type: object
          additionalProperties: true
          nullable: true
        information_source: { type: string, nullable: true }
        source_date: { type: string, nullable: true }

    V2PublicFieldValue:
      type: object
      properties:
        value:
          oneOf:
            - type: string
            - type: boolean
        source: { $ref: "#/components/schemas/V2PublicSource" }
