  /whitelist-ips:
    get:
      tags:
        - Gestión de IPs Permitidas
      summary: Obtener lista de IPs permitidas para hacer llamadas a la API
      description: |
        Obtiene la lista de IPs permitidas para la cuenta del cliente. Si no hay IPs configuradas, 
        no se realiza validación de origen de las llamadas a la API. Si hay al menos una IP configurada, 
        todas las llamadas a la API deben provenir de estas IPs.
      responses:
        "200":
          description: Lista de IPs permitidas recuperada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  ips:
                    type: array
                    description: Lista de direcciones IP permitidas (IPv4 e IPv6).
                    items:
                      type: string
                      pattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,7}:$|^(?:[0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,5}(?::[0-9a-fA-F]{1,4}){1,2}$|^(?:[0-9a-fA-F]{1,4}:){1,4}(?::[0-9a-fA-F]{1,4}){1,3}$|^(?:[0-9a-fA-F]{1,4}:){1,3}(?::[0-9a-fA-F]{1,4}){1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,2}(?::[0-9a-fA-F]{1,4}){1,5}$|^[0-9a-fA-F]{1,4}:(?:(?::[0-9a-fA-F]{1,4}){1,6})$|^:(?:(?::[0-9a-fA-F]{1,4}){1,7}|:)$'
                    example: ["192.168.1.1", "10.0.0.0/24", "2001:db8::1"]
                  count:
                    type: integer
                    description: Número total de IPs permitidas.
                    example: 3
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

    post:
      tags:
        - Gestión de IPs Permitidas
      summary: Agregar IPs a la lista de permitidas para hacer llamadas a la API
      description: |
        Agrega una o más direcciones IP a la lista de IPs permitidas. Si es la primera IP que se agrega, 
        automáticamente se activa la validación de origen para todas las llamadas a la API.
        Máximo 100 IPs permitidas por cuenta.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - ips
              properties:
                ips:
                  type: array
                  description: Lista de direcciones IP a agregar (IPv4 e IPv6).
                  minItems: 1
                  maxItems: 100
                  items:
                    type: string
                    pattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,7}:$|^(?:[0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,5}(?::[0-9a-fA-F]{1,4}){1,2}$|^(?:[0-9a-fA-F]{1,4}:){1,4}(?::[0-9a-fA-F]{1,4}){1,3}$|^(?:[0-9a-fA-F]{1,4}:){1,3}(?::[0-9a-fA-F]{1,4}){1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,2}(?::[0-9a-fA-F]{1,4}){1,5}$|^[0-9a-fA-F]{1,4}:(?:(?::[0-9a-fA-F]{1,4}){1,6})$|^:(?:(?::[0-9a-fA-F]{1,4}){1,7}|:)$'
            examples:
              SingleIP:
                summary: Agregar una sola IP
                value:
                  ips: ["192.168.1.1"]
              MultipleIPs:
                summary: Agregar múltiples IPs
                value:
                  ips: ["192.168.1.1", "10.0.0.0/24", "2001:db8::1"]
      responses:
        "200":
          description: IPs added successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "IPs added successfully"
                  added_ips:
                    type: array
                    description: Lista de IPs que fueron agregadas.
                    items:
                      type: string
                    example: ["192.168.1.1", "10.0.0.0/24"]
                  total_ips:
                    type: integer
                    description: Número total de IPs permitidas después de la operación.
                    example: 5
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "413":
          description: Maximum number of IPs (100) would be exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              examples:
                IpsLimitExceeded:
                  summary: Límite de IPs excedido
                  value:
                    success: false
                    message: "Maximum number of IPs (100) would be exceeded"
                    current_count: 100
                    max_allowed: 100
                    request_count: 101
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

    delete:
      tags:
        - Gestión de IPs Permitidas
      summary: Eliminar todas las IPs permitidas
      description: |
        Elimina todas las IPs de la lista de permitidas. Después de esta operación, 
        no se realizará validación de origen para las llamadas a la API.
      responses:
        "200":
          description: All IPs have been deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "All IPs have been deleted"
                  deleted_count:
                    type: integer
                    description: Número de IPs que fueron eliminadas.
                    example: 5
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

  /whitelist-ips/{ip}:
    delete:
      tags:
        - Gestión de IPs Permitidas
      summary: Eliminar IP específica de la lista de permitidas
      description: |
        Elimina una dirección IP específica de la lista de IPs permitidas. 
        Si se elimina la última IP, se desactiva la validación de origen.
      parameters:
        - name: ip
          in: path
          required: true
          description: |
            Dirección IP a eliminar (IPv4 o IPv6).
            Para eliminar una IP con formato CIDR, es necesario codificar el `/` como `%2F`. Por ejemplo, para eliminar la IP `10.0.0.0/24`, la URL deberia ser `/whitelist-ips/10.0.0.0%2F24`.
          schema:
            type: string
            pattern: '^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$|^(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,7}:$|^(?:[0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,5}(?::[0-9a-fA-F]{1,4}){1,2}$|^(?:[0-9a-fA-F]{1,4}:){1,4}(?::[0-9a-fA-F]{1,4}){1,3}$|^(?:[0-9a-fA-F]{1,4}:){1,3}(?::[0-9a-fA-F]{1,4}){1,4}$|^(?:[0-9a-fA-F]{1,4}:){1,2}(?::[0-9a-fA-F]{1,4}){1,5}$|^[0-9a-fA-F]{1,4}:(?:(?::[0-9a-fA-F]{1,4}){1,6})$|^:(?:(?::[0-9a-fA-F]{1,4}){1,7}|:)$'
            example: "192.168.1.1"
      responses:
        "200":
          description: IP eliminada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: "IP eliminada exitosamente"
                  deleted_ip:
                    type: string
                    description: IP que fue eliminada.
                    example: "192.168.1.1"
                  remaining_ips:
                    type: integer
                    description: Número de IPs restantes en la lista.
                    example: 4
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

  /api-keys:
    get:
      tags:
