      summary: Obtener política de retención actual
      description: |
        Obtiene la política de retención de datos configurada para la cuenta.
        Si no hay política configurada, retorna la política por defecto.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Política de retención obtenida exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
              example:
                retention_days: 30
        "401":
          description: No autorizado. API key inválida o faltante.
        "500":
          description: Error interno del servidor.

    post:
      tags:
        - Gestión de Política de Retención
      summary: Crear política de retención
      description: |
        Crea una nueva política de retención de datos para la cuenta.
        Si ya existe una política, retorna un error.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyRequest"
            example:
              retention_days: 30
      responses:
        "201":
          description: Política de retención creada exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
              example:
                retention_days: 30
        "400":
          description: |
            Solicitud inválida. Posibles causas:
            - retention_days fuera del rango permitido (1-3650)
            - Ya existe una política de retención
        "401":
          description: No autorizado. API key inválida o faltante.
        "500":
          description: Error interno del servidor.

    put:
      tags:
        - Gestión de Política de Retención
      summary: Actualizar política de retención
      description: |
        Actualiza la política de retención de datos existente para la cuenta.
        Si no existe una política, la crea.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RetentionPolicyRequest"
            example:
              retention_days: 60
      responses:
        "200":
          description: Política de retención actualizada exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RetentionPolicy"
              example:
                retention_days: 60
        "400":
          description: |
            Solicitud inválida. Posibles causas:
            - retention_days fuera del rango permitido (1-3650)
        "401":
          description: No autorizado. API key inválida o faltante.
        "500":
          description: Error interno del servidor.

    delete:
      tags:
        - Gestión de Política de Retención
      summary: Eliminar política de retención
      description: |
        Elimina la política de retención de datos de la cuenta.
        Después de esta operación, se aplicará la política por defecto del sistema.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Política de retención eliminada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Política de retención eliminada exitosamente"
        "401":
          description: No autorizado. API key inválida o faltante.
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          description: Error interno del servidor.

  /v2/webhooks:
    get:
      tags:
        - Gestión de Webhooks
      summary: Listar webhooks
      description: |
        Obtiene la lista de webhooks configurados para tu cuenta. Cada webhook define una URL de destino,
        eventos suscritos y metadatos para la firma de seguridad.
      security:
        - ApiKeyAuth: []
      responses:
        "200":
          description: Lista de webhooks obtenida exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/WebhookGet"
              examples:
                Success:
                  summary: Respuesta exitosa
                  value:
                    - id: "wh_123"
                      url: "https://example.com/webhooks/trebol"
                      events: ["verification.v2.created"]
                      status: "enabled"
                      description: "Webhook principal de producción"
                      created_at: "2025-08-20T10:00:00Z"
                      updated_at: "2025-08-20T10:00:00Z"
        "401":
          description: No autorizado - API key inválida.
        "500":
          description: Error interno del servidor.
    post:
      tags:
        - Gestión de Webhooks
      summary: Crear webhook
      description: |
        Crea un nuevo webhook para tu cuenta. Por seguridad, el secreto solo se muestra una vez en la creación.
      security:
        - ApiKeyAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WebhookCreate"
            examples:
              CreateWebhook:
                summary: Crear webhook con eventos por defecto
                value:
                  url: "https://example.com/webhooks/trebol"
                  events:
                    ["verification.v2.created", "verification.v2.finished"]
                  description: "Webhook principal de producción"
      responses:
        "201":
          description: Webhook creado exitosamente.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
              examples:
                Success:
                  summary: Webhook creado
                  value:
                    id: "wh_123"
                    url: "https://example.com/webhooks/trebol"
                    events:
                      ["verification.v2.created", "verification.v2.finished"]
                    status: "enabled"
                    description: "Webhook principal de producción"
                    secret: "whsec_XXXXXXXXXXXXXXXXXXXXXXXX"
                    created_at: "2025-08-20T10:00:00Z"
                    updated_at: "2025-08-20T10:00:00Z"
        "400":
          description: Datos de entrada inválidos.
        "401":
          description: No autorizado - API key inválida.
        "500":
          description: Error interno del servidor.

