                    example: "treb_sk_live_1234567890abcdef1234567890abcdef1234567890abcdef"
                  created_at:
                    type: string
                    format: date-time
                    description: Fecha y hora de creación
                    example: "2024-01-15T10:30:00Z"
              examples:
