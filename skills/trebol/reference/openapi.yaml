  /v2/verifications/{verification-id}/{entity}:
    get:
      tags:
        - Leer información de la empresa
      summary: Obtener sección por ID de verificación
      description: |

        Retorna datos públicos v2 de una sección específica de una verificación a partir de su id.

        **Secciones disponibles:**
        - `details`: Detalles de la empresa (información legal, fiscal, registro, etc.)
        - `shareholders`: Accionistas y capital social
        - `people`: Personas clave, apoderados y representantes legales
        - `documents`: Documentos asociados a la verificación
        - `sources`: Fuentes de información (items) que alimentan la verificación

