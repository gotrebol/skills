  /verifications/{verification-id}/add-items:
    put:
      tags:
        - Agregar items a una verificacion
      summary: Agregar items a una verificación existente
      description: |
        Agrega nuevos items/documentos a una verificación específica usando el id de la verificación.

        **Flujo de trabajo:**
        - **Paso 2 (Validación)**: Agregar items tipo `doc_validation` para validar documentos
        - **Paso 5 (Extracción)**: Agregar items de extracción real (`ac_mx`, `csf_mx`, etc.) basados en resultados de validación
      parameters:
        - in: path
          name: verification-id
          required: true
          description: El ID de la verificación.
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - items
              properties:
                items:
                  type: array
                  description: |
                    Una lista de ítems o documentos que serán agregados a la verificación, cada item debe tener un tipo y opciones.
                  items:
                    type: object
                    required:
                      - type
                      - options
                    properties:
                      type:
                        type: string
                        description: |
                          El tipo de documento o ítem a procesar.
                          - Para **Paso 2 (Validación)**: usar `doc_validation`
                          - Para **Paso 5 (Extracción)**: usar tipos específicos como `ac_mx`, `csf_mx`, `union_documents_extractor`
                        enum:
                          [
                            "doc_validation",
                            "ac_mx",
                            "csf_mx",
                            "union_documents_extractor",
                            "generic",
                          ]
                        example: "doc_validation"
                      tags:
                        type: object
                        description: Mapa de etiquetas que se asignarán al ítem como pares clave-valor.
                        additionalProperties:
                          type: string
                        example:
                          client_id: "some-client-id"
                      options:
                        type: object
                        required:
                          - file_url
                        description: Opciones adicionales para el ítem, como el alcance de las personas involucradas.
                        properties:
                          file_url:
                            type: string
                            description: URL de un archivo presignado que se puede descargar para el ítem a verificar.
                            example: "https://www.googleapis.com/downloadableFile"
                          constancia_type:
                            type: string
                            description: Tipo de constancia para items csf_mx (opcional). Especifica si es para empresa o individuo.
                            enum: ["business", "individual"]
                            example: "business"
                          people_scope:
                            type: array
                            description: Especifica el alcance de las personas que deben ser consideradas en la verificación.
                            items:
                              type: string
                              example: "powers"
                          client_item_type:
                            $ref: "#/components/schemas/ClientItemType"
            examples:
              Step2Validation:
                summary: Paso 2 - Validación de documentos
                value:
                  items:
                    - type: "doc_validation"
                      options:
                        file_url: "https://www.googleapis.com/downloadableFile"
                      tags:
                        some: "tag value"
              Step5Extraction:
                summary: Paso 5 - Extracción de información
                value:
                  items:
                    - type: "ac_mx"
                      options:
                        file_url: "https://www.googleapis.com/downloadableFile"
                      tags:
                        some: "tag value"
                    - type: "union_documents_extractor"
                      options:
                        file_url: "https://www.googleapis.com/downloadableFile"
                      tags:
                        some: "tag value"
                    - type: "csf_mx"
                      options:
                        file_url: "https://www.googleapis.com/downloadableFile"
                        constancia_type: "business"
                      tags:
                        some: "tag value"
      responses:
        "200":
          description: Items agregados exitosamente a la verificación.
          content:
            application/json:
              schema:
                type: array
                description: Lista de items agregados con sus IDs asignados.
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                      description: ID del ítem/documento.
                      example: 25440
                    item_status:
                      type: string
                      description: Estado del ítem/documento.
                      example: "pending"
                      enum: [pending, complete]
                    item_type:
                      type: string
                      description: Tipo de ítem/documento.
                      example: "ubos"
                    item_value:
                      type: object
                      description: Valores especificos del ítem/documento.
                    item_options:
                      type: object
                      description: Opciones adicionales del ítem/documento que afectan al proceso interno del mismo.
                      properties:
                        is_optional:
                          type: boolean
                          description: Indica si el ítem/documento es opcional.
                          example: true
                      nullable: true
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "500":
          $ref: "#/components/responses/InternalServerError"
      security:
        - ApiKeyAuth: []

