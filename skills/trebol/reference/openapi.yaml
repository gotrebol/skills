openapi: 3.0.0
info:
  title: Coleccion de API KYB MX
  description: |
    La Colección de API KYB MX proporciona puntos finales para crear y gestionar verificaciones de empresas en México. La verificación de empresas implica validar la información proporcionada por un cliente comercial, incluyendo documentos y fuentes de datos, para asegurar su legitimidad y precisión.

    Cada verificación de empresa puede incluir múltiples ítems, como Actas Constitutivas, Constancias de Situación Fiscal, Identificaciones Personales y Comprobantes de Domicilio. Trebol maneja automáticamente la clasificación de documentos, lo que te permite enviar todos los documentos requeridos como URLs descargables (por ejemplo, URLs prefirmadas de AWS o GCP).

    **Autenticación**: 
    La API utiliza una clave API para la autenticación, pasada en el encabezado `x-api-key`. Para obtener una clave API, por favor [contáctanos](mailto:sales@gotrebol.com).

  version: 1.0.0

servers:
  - url: https://api.gotrebol.com
  - url: http://{{trebol_api_base_url}}

tags:
  - name: Creacion de Verificacion
    description: Endpoints para crear nuevas verificaciones.
  - name: Leer información de la empresa
    description: Endpoints v2 para obtener información detallada de empresas y verificaciones.
  - name: Leer por Etiqueta
    description: Endpoints para obtener información detallada sobre empresas mediante etiquetas.
  - name: Leer por ID de Verificacion
    description: Endpoints para obtener información detallada sobre verificaciones mediante ID.
  - name: Gestión de IPs Permitidas
    description: Endpoints para gestionar la lista de IPs permitidas (whitelist) para la cuenta del cliente.
  - name: Gestión de API Keys
    description: Endpoints para crear, listar y eliminar API keys de la cuenta del usuario.
  - name: Gestion de item Ids
    description: Endpoints para gestionar items de verificaciones.
  - name: Invalidar un documento
    description: Endpoints para invalidar documentos de verificaciones.
  - name: Labels de Verificacion
    description: Endpoints para gestionar labels de verificaciones.
  - name: Actualizar personas clave de una verificacion
    description: Endpoints para actualizar personas clave de verificaciones.
  - name: Agregar items a una verificacion
    description: Endpoints para agregar items a verificaciones existentes.
  - name: Estado de validacion de documentos
    description: Endpoints para obtener el estado de validación de documentos.
  - name: Gestión de Flujos de Cuenta
    description: Endpoints para gestionar flujos de cuenta.
  - name: Gestión de Webhooks
    description: Endpoints para crear, listar, actualizar y eliminar webhooks de la cuenta.
  - name: Gestión de Política de Retención
    description: Endpoints para gestionar la política de retención de datos de la cuenta.
  - name: Exportación de Verificaciones
    description: Endpoints para exportar datos de verificaciones a documentos personalizados.
  - name: Leer información de la empresa v1
    description: Endpoints v1 (legacy) para obtener información detallada de empresas y verificaciones. Te recomendamos migrar a los endpoints v2.

paths:
  /verifications:
    post:
      operationId: crearNuevaVerificacion
      tags:
        - Creacion de Verificacion
      summary: Crear una nueva verificación
      description: |
        Inicia una nueva verificación con los documentos especificados.

        **Nota:** Este endpoint permite crear verificaciones de empresas con documentos y configuraciones personalizadas.
      security:
        - ApiKeyAuth: []
      requestBody:
        description: |
          Hay dos formas de crear una verificacion, usando un flujo predefinido, el cual ya contiene todos los items y configuraciones necesarias o bien 
          pasando un array de items a verificar, la cual permite crear una verificacion con items personalizados, sin un flujo predefinido.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: "#/components/schemas/VerificationWithFlowId"
                - $ref: "#/components/schemas/VerificationWithItems"
            examples:
              ConFlowId:
                summary: Usando flow_id
                value:
                  country: "mx"
                  tag: "etiqueta"
                  flow_id: "some-flow-id"
                  friendly_name: "Empresa ACME S.A. de C.V."
                  metadata:
                    some: "value"
                  key_people:
                    - names: "John Doe"
                      scope: ["powers"]
              ConItems:
                summary: Usando items
                value:
                  country: "mx"
                  tag: "etiqueta"
                  friendly_name: "Juan Pérez López"
                  items:
                    - type: "generic"
                      options:
                        file_url: "https://www.somepresignedURL.com/withDownloadableFile"
                        client_item_type: "ac_mx"
                    - type: "generic"
                      options:
                        file_url: "https://www.somepresignedURL.com/withDownloadableFile"
                        people_scope: ["powers"]
                        client_item_type: "person_id"
                  metadata:
                    some: "value"
                  key_people:
                    - names: "John Doe"
                      scope: ["powers"]
      responses:
        "201":
          description: Verificación creada exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    description: ID de la verificación creada.
                    example: "c8dc41fc-c477-404e-aff7-b9074f86d6d1"
                  status:
                    type: string
                    description: Estado actual de la verificación.
                    example: "pending"
                  account_id:
                    type: string
                    format: uuid
                    description: ID de la cuenta asociada.
                    example: "99999999-9999-9999-9999-999999999999"
                  created_at:
                    type: string
                    format: date-time
                    description: Fecha y hora de creación de la verificación.
                    example: "2025-04-28T20:10:06.840Z"
                  updated_at:
                    type: string
                    format: date-time
                    description: Fecha y hora de última actualización de la verificación.
                    example: "2025-04-28T20:10:06.840Z"
                  flow_id:
                    type: string
                    description: Identificador del flujo de verificación utilizado.
                    example: "documents-v2"
                  documents_status:
                    type: string
                    enum: [pending_upload, partial_upload, full_upload]
                    description: Estado de la colección de documentos.
                    example: "pending_upload"
                  onboarding_url:
                    type: string
                    format: uri
                    description: Link de onboarding para el cliente.
                    example: "https://onboarding.gotrebol.com/verification/c8dc41fc-c477-404e-aff7-b9074f86d6d1/docs-v2?accessToken=accesstokenid32432434country=mx&client=99999999-9999-9999-9999-999999999999"
                  details_url:
                    type: string
                    format: uri
                    description: Link al reporte de la verificación.
                    example: "https://app.gotrebol.com/verifications/c8dc41fc-c477-404e-aff7-b9074f86d6d1"
                  access_token:
                    type: string
                    description: Token de acceso JWT para la sesión de verificación.
                    example: "eyJhbGciOiJIUzI1NiJ9..."
                  items:
                    type: array
                    description: Lista de ítems/documentos a verificar.
                    items:
                      type: object
                      properties:
                        id:
                          type: integer
                          description: ID del ítem/documento.
                          example: 25440
                        item_status:
                          type: string
                          description: Estado del ítem/documento.
                          example: "pending"
                          enum: [pending, complete]
                        item_type:
                          type: string
                          description: Tipo de ítem/documento.
                          example: "ubos"
                        item_internal_status:
                          type: string
                          description: Estado interno del ítem/documento.
                          example: "pending_validation"
                          nullable: true
                        item_value:
                          type: object
                          description: Valores especificos del ítem/documento.
                        validation_result:
                          type: object
                          description: Resultado de las validaciones del ítem/documento.
                          nullable: true
                        item_scope:
                          type: string
                          description: Alcance del ítem/documento.
                          enum: [basic, advanced]
                          example: "basic"
                        item_options:
                          type: object
                          description: Opciones adicionales del ítem/documento que afectan al proceso interno del mismo.
                          properties:
                            is_optional:
                              type: boolean
                              description: Indica si el ítem/documento es opcional.
                              example: true
                          nullable: true
                  tag:
                    type: string
                    description: Etiqueta identificadora única del creador de la verificación.
                    example: "33332-34-22"
                  email:
                    type: string
                    format: email
                    description: Correo electrónico asociado a la verificación.
                    example: "johndoe@mail.com"
                  country:
                    type: string
                    description: Código de país ISO 3166-1 alfa-2.
                    example: "mx"
                  tax_id:
                    type: string
                    description: RFC o número de identificación fiscal.
                    example: "SAG160927GIA"
                  business_name:
                    type: string
                    description: Nombre comercial de la empresa extraído automáticamente de los documentos.
                    nullable: true
                    example: "Trebol OPCO SAS"
                  friendly_name:
                    type: string
                    nullable: true
                    description: >
                      Nombre descriptivo asignado por el usuario al crear la verificación. Permite
                      identificar fácilmente la empresa o persona asociada a la verificación.
                    example: "Empresa ACME S.A. de C.V."
                  options:
                    type: object
                    description: Objeto reservado para opciones adicionales.
                  created_by:
                    type: string
                    description: ID del usuario/cliente que creó la verificación.
                    example: "99999999-9999-9999-9999-999999999999"
                  onboarding_terms_and_conditions:
                    type: string
                    description: Lista de terminos y condiciones de onboarding aprobados por el cliente y asociados a la verificación.
                    nullable: true
        "208":
          description: |
            Verificación duplicada detectada. Se retorna cuando se intenta crear una verificación que ya existe 
            en el sistema para la misma empresa y flujo.

            **Condiciones para recibir este código:**
            - El parámetro `verify_duplicate_verification` debe ser `true`
            - Se debe proporcionar un `tax_id` (RFC/NIT) válido
            - Se debe proporcionar un `flow_id` válido
            - Ya existe una verificación activa con el mismo `tax_id`, `account_id` y `flow_id`

            **Comportamiento:**
            - Se envía automáticamente un enlace de acceso al email del creador original
            - Se retorna información básica sobre la verificación existente (con email enmascarado)
            - No se crea una nueva verificación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Siempre será `false` para indicar que no se creó una nueva verificación
                    example: false
                  data:
                    type: object
                    description: Información sobre la verificación existente
                    properties:
                      creator_email:
                        type: string
                        description: |
                          Email del creador de la verificación original, enmascarado por privacidad.
                          Formato: primer_carácter + asteriscos + último_carácter + @dominio
                          Ejemplo: "john.doe@example.com" → "j**********e@example.com"
                        example: "j***@domain.com"
                      business_name:
                        type: string
                        description: Nombre comercial de la empresa de la verificación existente
                        example: "Trebol OPCO"
                    required:
                      - creator_email
                      - business_name
              examples:
                DuplicateVerification:
                  summary: Verificación duplicada detectada
                  description: |
                    Respuesta cuando se intenta crear una verificación que ya existe para la misma empresa y flujo.
                    El sistema automáticamente envía un enlace de acceso al creador original.
                  value:
                    success: false
                    data:
                      creator_email: "j***@trebol.com"
                      business_name: "Empresa Ejemplo S.A. de C.V."
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"
    get:
      operationId: listarVerificaciones
      tags:
        - Leer información de la empresa
      summary: Listar verificaciones de la cuenta
      description: |
        Retorna las verificaciones asociadas a la cuenta con paginación basada en tokens.
        El tamaño de página por defecto es 10 y el máximo permitido es 20.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: status
          in: query
          required: false
          description: Filtra por el estado de la verificación.
          schema:
            type: string
            enum: [pending, finished, error, pending_validation]
        - name: page_size
          in: query
          required: false
          description: |
            Cantidad de verificaciones por página. Valor por defecto: `10`.
            Debe ser un entero positivo; valores no enteros o menores o iguales a `0` resultan en `400 Bad Request`.
            Valores mayores a `20` se ajustan automáticamente al máximo permitido (`20`).
          schema:
            type: integer
            minimum: 1
            default: 10
        - name: next
          in: query
          required: false
          description: Token de paginación para obtener la siguiente página de resultados.
          schema:
            type: string
      responses:
        "200":
          description: Lista de verificaciones obtenida exitosamente.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicVerification"
                    description: Lista de verificaciones.
                  next:
                    type: string
                    description: Token para obtener la siguiente página de resultados (presente solo si hay más páginas).
                    nullable: true
              examples:
                Success:
                  summary: Lista de verificaciones obtenida exitosamente
                  value:
                    data:
                      - id: "c8dc41fc-c477-404e-aff7-b9074f86d6d1"
                        account_id: "99999999-9999-9999-9999-999999999999"
                        status: "pending"
                        created_at: "2025-04-28T20:10:06.840Z"
                        updated_at: "2025-04-28T20:10:06.840Z"
                        tag: "etiqueta"
                        tax_id: "SAG160927GIA"
                        business_name: "Trebol OPCO"
                        friendly_name: "Empresa ACME S.A. de C.V."
                        flow_id: "documents-v2"
                        details_url: "https://app.gotrebol.com/verifications/c8dc41fc-c477-404e-aff7-b9074f86d6d1"
                        onboarding_url: "https://onboarding.gotrebol.com/verification/c8dc41fc..."
                        items:
                          - id: 25440
                            item_status: "pending"
                            item_type: "csf_mx"
                            item_value: {}
                    next: "eyJjcmVhdGVkQXQiOiIyMDI1LTA0LTI4VDIwOjEwOjA2Ljg0MFoiLCJpZCI6ImM4ZGM0MWZjLWM0NzctNDA0ZS1hZmY3LWI5MDc0Zjg2ZDZkMSJ9"
        "400":
          $ref: "#/components/responses/BadRequestError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalServerError"

  /verification-items:
    get:
      tags:
        - Gestion de item Ids
      summary: Obtener todos los items de verificación
      description: |
        Retorna una lista de todos los items de verificación disponibles con paginación basada en tokens.
        La paginación funciona con un tamaño fijo de 10 items por página.
      security:
        - ApiKeyAuth: []
      parameters:
        - name: itemType
          in: query
          required: false
          description: Filtrar por tipo de item (ej. "generic", "csf_mx", etc.)
          schema:
            type: string
        - name: itemStatus
          in: query
          required: false
          description: Filtrar por estado del item (ej. "pending", "complete", "error")
          schema:
            type: string
        - name: tag
          in: query
          required: false
          description: Filtrar por etiqueta de verificación
          schema:
            type: string
        - name: next
          in: query
          required: false
          description: Token de paginación para obtener la siguiente página de resultados
          schema:
            type: string
      responses:
        "200":
          description: Lista de items de verificación obtenida exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: "#/components/schemas/PublicVerificationItem"
                    description: Lista de items de verificación (máximo 10 por página)
                  next:
                    type: string
                    description: Token para obtener la siguiente página de resultados (presente solo si hay más páginas)
                    nullable: true
              examples:
                Success:
                  summary: Lista de items de verificación obtenida exitosamente
                  value:
